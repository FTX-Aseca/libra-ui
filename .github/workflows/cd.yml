name: CD

on:
  push:
    tags:
      - "v*.*.*" # Production releases, e.g., v1.2.3
      - "v*.*.*-dev" # Development releases, e.g., v1.2.3-dev

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  IMAGE_NAME: ${{ endsWith(github.ref_name, '-dev') && 'libra-wallet-ui-dev' || 'libra-wallet-ui' }}
  # FLUTTER_VERSION: '3.x.x' # Optional: specify Flutter version if needed

jobs:
  determine-version:
    name: Determine Version from pubspec.yaml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      major: ${{ steps.get_version.outputs.major }}
      minor: ${{ steps.get_version.outputs.minor }}
      patch: ${{ steps.get_version.outputs.patch }}
      build: ${{ steps.get_version.outputs.build }}
      version_tag: ${{ steps.get_version.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create .env file
        run: echo "" > .env

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          # Extracts version: x.y.z+b or x.y.z
          VERSION_LINE=$(grep 'version:' pubspec.yaml | head -n 1)
          PUB_VERSION=$(echo "$VERSION_LINE" | awk '{print $2}')
          echo "Pubspec version line: $VERSION_LINE"
          echo "Extracted pubspec version: $PUB_VERSION"

          VERSION_NAME=$(echo "$PUB_VERSION" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$PUB_VERSION" | cut -d'+' -f2)
          if [ "$VERSION_NAME" == "$BUILD_NUMBER" ]; then # No build number present
            BUILD_NUMBER="1" # Default build number
          fi

          MAJOR=$(echo "$VERSION_NAME" | cut -d. -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d. -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d. -f3)

          echo "version=$PUB_VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "version_tag=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT # For artifact naming

  build-android:
    name: Build Flutter Android APK
    needs: determine-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create .env file
        run: echo "" > .env

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable" # or your preferred channel: beta, dev, master
          # flutter-version: ${{ env.FLUTTER_VERSION }} # Uncomment to pin version

      - name: Flutter Clean
        run: flutter clean

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Flutter APK
        run: |
          flutter build apk --release --build-name=${{ needs.determine-version.outputs.version_tag }} --build-number=${{ needs.determine-version.outputs.build }}
          # Default APK location
          APK_SRC_PATH="build/app/outputs/flutter-apk/app-release.apk"
          APK_DST_NAME="app-release-${{ needs.determine-version.outputs.version_tag }}.apk"
          if [ -f "$APK_SRC_PATH" ]; then
            mv "$APK_SRC_PATH" "$APK_DST_NAME"
            echo "APK moved to $APK_DST_NAME"
          else
            echo "::error::APK not found at $APK_SRC_PATH!"
            exit 1
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app-release-${{ needs.determine-version.outputs.version_tag }}.apk

  build-ios:
    name: Build Flutter iOS IPA
    needs: determine-version
    runs-on: macos-latest # iOS builds require macOS
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create .env file
        run: echo "" > .env

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          # flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Create/Verify ExportOptions.plist
        working-directory: ./ios
        run: |
          PLIST_PATH="ExportOptions.plist"
          if [ ! -f "$PLIST_PATH" ]; then
            echo "::warning::ExportOptions.plist not found. Creating a default one for ad-hoc distribution."
            echo "::warning::You should create and customize an ExportOptions.plist for your specific needs (e.g., app-store, enterprise)."
            cat <<EOF > "$PLIST_PATH"
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>ad-hoc</string> <!-- Or app-store, enterprise, development -->
                <key>teamID</key>
                <string>YOUR_TEAM_ID</string> <!-- IMPORTANT: Replace with your Apple Developer Team ID -->
                <key>signingStyle</key>
                <string>automatic</string>
                <key>stripSwiftSymbols</key>
                <true/>
                <key>uploadBitcode</key>
                <false/>
                <key>uploadSymbols</key>
                <false/>
            </dict>
            </plist>
            EOF
            echo "Default ExportOptions.plist created. PLEASE REVIEW AND CUSTOMIZE IT, ESPECIALLY YOUR TEAM ID."
          else
            echo "Using existing ExportOptions.plist."
          fi

      - name: Flutter Clean
        run: flutter clean

      - name: Flutter Pub Get
        run: flutter pub get

      # Optional: Install CocoaPods dependencies if your project uses them
      # - name: Install CocoaPods
      #   if: steps.flutter_config.outputs.ios == 'true' && steps.flutter_config.outputs.has_cocoapods == 'true'
      #   working-directory: ./ios
      #   run: pod install --repo-update

      - name: Build Flutter IPA
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --build-name=${{ needs.determine-version.outputs.version_tag }} --build-number=${{ needs.determine-version.outputs.build }}
          # Default IPA location (usually a single IPA in this directory)
          IPA_DIR="build/ios/ipa"
          IPA_NAME="app-release-${{ needs.determine-version.outputs.version_tag }}.ipa"
          BUILT_IPA=$(find "$IPA_DIR" -name "*.ipa" -type f | head -n 1)

          if [ -n "$BUILT_IPA" ] && [ -f "$BUILT_IPA" ]; then
            echo "IPA found at $BUILT_IPA"
            mv "$BUILT_IPA" "$IPA_NAME"
            echo "IPA renamed to $IPA_NAME"
          else
            echo "::error::IPA not found in $IPA_DIR or build failed."
            ls -R build/ios # List contents for debugging
            exit 1
          fi

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app-release-${{ needs.determine-version.outputs.version_tag }}.ipa

  release:
    name: Create Release and Bump Version
    needs: [determine-version, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for version bumping and PR creation
      - name: Create .env file
        run: echo "" > .env

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: . # Download to current directory

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: . # Download to current directory

      - name: Display downloaded files
        run: ls -l

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ endsWith(github.ref_name, '-dev') && format('Dev Release {0}', github.ref_name) || format('Release {0}', github.ref_name) }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ endsWith(github.ref_name, '-dev') }}
          generate_release_notes: true
          files: |
            app-release-${{ needs.determine-version.outputs.version_tag }}.apk
            app-release-${{ needs.determine-version.outputs.version_tag }}.ipa

      - name: Configure Git
        if: (!endsWith(github.ref_name, '-dev'))
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update version in pubspec.yaml
        if: (!endsWith(github.ref_name, '-dev')) # Run for production tags like v1.2.3
        env:
          VERSION_MAJOR: ${{ needs.determine-version.outputs.major }}
          VERSION_MINOR: ${{ needs.determine-version.outputs.minor }}
          VERSION_PATCH: ${{ needs.determine-version.outputs.patch }}
        run: |
          # Calculate next version for pubspec.yaml (e.g., 1.2.3+X -> 1.2.4+1)
          NEXT_PATCH=$(( $VERSION_PATCH + 1 ))
          NEXT_BUILD_NUMBER=1 # Reset build number for the new patch version
          NEXT_VERSION_NAME="$VERSION_MAJOR.$VERSION_MINOR.$NEXT_PATCH"
          NEXT_FULL_VERSION="${NEXT_VERSION_NAME}+${NEXT_BUILD_NUMBER}"

          echo "Current version (name from pubspec): $VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH"
          echo "Current build number (from pubspec or default 1): ${{ needs.determine-version.outputs.build }}"
          echo "Calculated next version for pubspec: $NEXT_FULL_VERSION"

          # Update version in pubspec.yaml using sed. This can be fragile.
          # It assumes `version: x.y.z+b` or `version: x.y.z`
          # Using a | delimiter for sed because $NEXT_FULL_VERSION contains +
          sed -i -E "s|^version: .*|version: $NEXT_FULL_VERSION|" pubspec.yaml

          # Verify the change
          echo "Updated pubspec.yaml to: $NEXT_FULL_VERSION"
          grep 'version:' pubspec.yaml | head -n 1

          # Set NEXT_VERSION_ENV for the PR step
          echo "NEXT_VERSION_ENV=$NEXT_FULL_VERSION" >> $GITHUB_ENV

      - name: Create Pull Request for version bump
        if: (!endsWith(github.ref_name, '-dev')) # Run for production tags
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ env.NEXT_VERSION_ENV }}"
          title: "chore: bump version to ${{ env.NEXT_VERSION_ENV }}"
          body: |
            This PR was automatically created to bump the version in `pubspec.yaml` after release `${{ github.ref_name }}`.

            New version: `${{ env.NEXT_VERSION_ENV }}`
          branch: chore/version-bump-${{ needs.determine-version.outputs.version_tag }} # Unique branch name
          base: main # Assuming 'main' is your default branch
          # Add assignees, reviewers, labels as needed
